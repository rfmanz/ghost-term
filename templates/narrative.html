<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e14;
    --text: #c8d6e5;
    --subtext: #7f8fa6;
    --accent: #00e5ff;
    --accent2: #00bfa5;
    --red: #ff5252;
    --yellow: #ffd740;
    --blue: #40c4ff;
    --border: rgba(0, 229, 255, 0.15);
    --glow: rgba(0, 229, 255, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 1.05rem;
  }

  #bgvideo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.25;
    filter: saturate(0.4) brightness(0.6);
  }

  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .container {
    position: relative;
    z-index: 10;
    max-width: 880px;
    margin: 0 auto;
    padding: 50px 40px 80px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    text-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0, 229, 255, 0.15);
  }

  h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    margin-top: 36px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--glow);
  }

  h3 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--yellow);
    margin-top: 20px;
    margin-bottom: 10px;
    text-shadow: 0 0 8px rgba(255, 215, 64, 0.2);
  }

  p { margin-bottom: 16px; }

  ul, ol { padding-left: 24px; margin-bottom: 16px; }

  li {
    margin-bottom: 10px;
    color: var(--text);
  }

  li::marker { color: var(--accent2); }

  strong { color: #fff; font-weight: 600; }
  em { color: var(--subtext); }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  blockquote {
    border-left: 2px solid var(--accent);
    padding: 14px 20px;
    margin: 16px 0;
    background: rgba(0, 229, 255, 0.04);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--subtext);
    font-size: 0.95rem;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 0.85rem;
  }

  th {
    background: rgba(0, 229, 255, 0.08);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-weight: 500;
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--accent);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  tr:hover td { background: rgba(0, 229, 255, 0.03); }

  code {
    font-family: 'Share Tech Mono', monospace;
    background: rgba(0, 229, 255, 0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--accent);
  }

  pre {
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 16px 0;
  }

  pre code {
    background: none;
    padding: 0;
  }

  .meta {
    color: var(--subtext);
    font-size: 0.85rem;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .highlight-red { color: var(--red); font-weight: 600; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 255, 0.4); }
</style>
</head>
<body>

<video id="bgvideo" autoplay muted loop playsinline></video>
<div id="scanlines"></div>
<div id="vignette"></div>

<div class="container">
{{CONTENT}}
</div>

<script>
// Video background
const video = document.getElementById('bgvideo');
if (video.dataset.src) video.src = video.dataset.src;

// j/k vim-style scrolling
document.addEventListener('keydown', (e) => {
  const step = 80;
  if (e.key === 'j') window.scrollBy({ top: step, behavior: 'smooth' });
  if (e.key === 'k') window.scrollBy({ top: -step, behavior: 'smooth' });
  if (e.key === 'd' && !e.ctrlKey) window.scrollBy({ top: window.innerHeight / 2, behavior: 'smooth' });
  if (e.key === 'u' && !e.ctrlKey) window.scrollBy({ top: -window.innerHeight / 2, behavior: 'smooth' });
  if (e.key === 'g' && !e.shiftKey) window.scrollTo({ top: 0, behavior: 'smooth' });
  if (e.key === 'G') window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});

// Fullscreen on first click
document.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}, { once: true });
</script>

</body>
</html>
